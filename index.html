<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>伊登花園消防缺失複查表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#fff;--c-bg2:#f7f7f5;--c-bg3:#f0efec;
  --c-text:#1a1a1a;--c-text2:#666;--c-text3:#999;
  --c-border:#e0ddd8;--c-border2:#ccc;
  --c-red-bg:#FCEBEB;--c-red:#A32D2D;
  --c-grn-bg:#EAF3DE;--c-grn:#3B6D11;
  --c-amber:#854F0B;--c-amber-bg:#FAEEDA;
  --c-orange:#D85A30;
  --c-blue-bg:#E6F1FB;--c-blue:#185FA5;
  --c-teal-bg:#E1F5EE;--c-teal:#0F6E56;
  --c-purple-bg:#EEEDFE;--c-purple:#534AB7;
  --c-gray-bg:#F1EFE8;--c-gray:#5F5E5A;
}
@media(prefers-color-scheme:dark){
  :root{
    --c-bg:#1c1c1e;--c-bg2:#2c2c2e;--c-bg3:#3a3a3c;
    --c-text:#f2f2f7;--c-text2:#aeaeb2;--c-text3:#636366;
    --c-border:#3a3a3c;--c-border2:#48484a;
    --c-red-bg:#3d1515;--c-red:#f09595;
    --c-grn-bg:#1a3010;--c-grn:#97c459;
    --c-amber:#EF9F27;--c-amber-bg:#2e1f05;
    --c-orange:#EF9F27;
    --c-blue-bg:#0c2d4e;--c-blue:#85b7eb;
    --c-teal-bg:#04342c;--c-teal:#5dcaa5;
    --c-purple-bg:#26215c;--c-purple:#afa9ec;
    --c-gray-bg:#2c2c2a;--c-gray:#b4b2a9;
  }
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--c-bg3);color:var(--c-text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans GB','PingFang TC',sans-serif;padding:0;min-height:100vh}

.top-bar{background:var(--c-bg);border-bottom:1px solid var(--c-border);padding:12px 16px;position:sticky;top:0;z-index:100}
.top-title{font-size:15px;font-weight:600;color:var(--c-text)}
.top-sub{font-size:11px;color:var(--c-text2);margin-top:2px}
.top-stats{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.stat{background:var(--c-bg2);border-radius:8px;padding:6px 12px;text-align:center;flex:1;min-width:70px}
.sn{font-size:18px;font-weight:600;color:var(--c-text)}.sn.r{color:var(--c-red)}.sn.g{color:var(--c-grn)}
.sl{font-size:10px;color:var(--c-text2);margin-top:1px}
.pb-global{height:4px;background:var(--c-border);margin-top:10px;border-radius:2px;overflow:hidden}
.pb-global-fill{height:100%;background:var(--c-grn);transition:width .3s;border-radius:2px}

.content{padding:12px 12px 80px}
.bld-card{background:var(--c-bg);border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid var(--c-border)}
.bld-hd{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.bld-hd:active{background:var(--c-bg2)}
.bld-name{font-size:16px;font-weight:600;color:var(--c-text);flex:1}
.bdg{font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;font-weight:500}
.bdg-r{background:var(--c-red-bg);color:var(--c-red)}
.bdg-g{background:var(--c-grn-bg);color:var(--c-grn)}
.tog{font-size:12px;color:var(--c-text3);transition:transform .2s;width:20px;text-align:center}
.tog.op{transform:rotate(180deg)}
.pbr{height:3px;background:var(--c-border)}
.pbf{height:100%;background:var(--c-grn);transition:width .3s}

.cat-hd{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--c-border);border-bottom:1px solid var(--c-border)}
.cat-ico{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.cat-name{font-size:12px;font-weight:600;color:var(--c-text2);flex:1}
.cat-law{font-size:10px;color:var(--c-text3);font-style:italic;text-align:right;max-width:160px}

.legend{display:flex;gap:16px;padding:6px 14px;font-size:11px;color:var(--c-text2);border-bottom:1px solid var(--c-border);flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
@media(max-width:400px){.grid{grid-template-columns:repeat(auto-fill,minmax(85px,1fr))}}
@media(min-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}}
@media(min-width:900px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}

.cell{padding:10px 8px;border-right:1px solid var(--c-border);border-bottom:1px solid var(--c-border);display:flex;align-items:flex-start;gap:5px;background:var(--c-bg);cursor:pointer;min-height:44px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.cell:active{background:var(--c-bg2)}
.cell.done{background:var(--c-bg2)}
.cell input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:1px;accent-color:var(--c-grn);cursor:pointer;touch-action:manipulation}
.cell-txt{font-size:12px;color:var(--c-text);line-height:1.4}
.cell.done .cell-txt{text-decoration:line-through;color:var(--c-text3)}
.dm{font-size:14px;font-weight:700;color:var(--c-orange);flex-shrink:0;line-height:1.3}
.sev-h{display:inline-block;font-size:10px;background:var(--c-red-bg);color:var(--c-red);border-radius:3px;padding:0 4px;margin-left:2px}

/* appendix */
.app-card{background:var(--c-bg);border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid var(--c-border)}
.app-title{font-size:15px;font-weight:600;color:var(--c-text);padding:12px 14px;border-bottom:1px solid var(--c-border)}
.app-sub{font-size:11px;color:var(--c-text2);font-weight:400;margin-top:2px}
.law-item{border-bottom:1px solid var(--c-border);padding:12px 14px}
.law-item:last-child{border-bottom:none}
.law-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.law-ico{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.law-name{font-size:13px;font-weight:600;color:var(--c-text);flex:1}
.tag{display:inline-block;font-size:10px;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:500}
.tag-r{background:var(--c-red-bg);color:var(--c-red)}
.law-ref{font-size:11px;color:var(--c-blue);background:var(--c-blue-bg);border-radius:6px;padding:7px 10px;margin-bottom:6px;line-height:1.6}
.law-plain{font-size:12px;color:var(--c-text);background:var(--c-bg2);border-radius:6px;padding:7px 10px;line-height:1.6;border-left:3px solid var(--c-grn)}
.law-plain-label{font-size:10px;color:var(--c-grn);font-weight:600;margin-bottom:3px}

.fab{position:fixed;bottom:20px;right:16px;background:var(--c-text);color:var(--c-bg);border:none;border-radius:50px;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;z-index:200;display:flex;align-items:center;gap:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.96)}
</style>
</head>

   ref:'設置標準 §149：避難器具設置位置需以指示燈標示，燈具規格及持續供電要求比照 §146，斷電後電池維持≥30分鐘。',
   plain:'這個燈是告訴人「這裡有緩降機可以逃」。燈壞了大家在煙霧中找不到器材，30分鐘電池同樣是基本要求。'},
  {ico:'🔢',bg:'var(--c-purple-bg)',name:'樓梯間樓層燈',sev:false,
   ref:'建築技術規則 §92：樓梯間需設置足夠照明，停電後緊急照明需維持一定時間。設置標準 §148：樓層方向指示燈斷電後蓄電池供電維持≥30分鐘，確保逃生路線方向清晰。',
   plain:'樓梯間的燈壞掉，逃生時走到黑漆漆的樓梯很容易跌倒或走錯方向。停電時要靠電池亮30分鐘，讓人順利走到安全出口。'},
  {ico:'💡',bg:'var(--c-teal-bg)',name:'照明燈（走廊／梯間）',sev:false,
   ref:'建築技術規則 §92：走廊、樓梯間應設置緊急照明；停電後緊急電源（發電機或蓄電池）需於10秒內自動切換，並維持≥30分鐘之照度（地面照度≥2 lux）。',
   plain:'走廊跟樓梯的照明燈，停電10秒內要自動切緊急電源繼續亮，至少維持30分鐘，地板要亮到2 lux以上（小夜燈的亮度）。達不到就算不合格。'},
  {ico:'➡',bg:'var(--c-gray-bg)',name:'地下室方向燈',sev:false,
   ref:'設置標準 §146：地下層避難方向指示燈需指向最近安全梯或出口，雙面燈兩面均需正常；斷電後電池維持≥30分鐘。地下室能見度低，為重點設置區域。',
   plain:'地下室沒有自然採光，一停電就全黑，是最危險的地方。方向燈要清楚指向出口，兩面燈都要亮，電池要撐30分鐘。任何一顆壞都可能讓人在地下室迷路。'},
];

let chk={};
let allKeys=[];

function mkKey(bid,ci,ii){return bid+'|'+ci+'|'+ii}

function updStats(){
  const tot=allKeys.length,dn=Object.values(chk).filter(Boolean).length;
  document.getElementById('s-tot').textContent=tot;
  document.getElementById('s-dn').textContent=dn;
  document.getElementById('s-pct').textContent=Math.round(dn/tot*100)+'%';
  document.getElementById('pb-global').style.width=Math.round(dn/tot*100)+'%';
  BLDS.forEach(b=>{
    const bk=allKeys.filter(k=>k.startsWith(b.id+'|'));
    const bt=bk.length,bd=bk.filter(k=>chk[k]).length;
    const pb=document.getElementById('pb-'+b.id);
    const bdg=document.getElementById('bdg-'+b.id);
    if(pb)pb.style.width=bt?Math.round(bd/bt*100)+'%':'0%';
    if(bdg){bdg.textContent=bd+'/'+bt+' 已完成';bdg.className='bdg '+(bd===bt&&bt>0?'bdg-g':'bdg-r')}
  });
}

function render(){
  const con=document.getElementById('content');
  con.innerHTML='';

  BLDS.forEach(b=>{
    const card=document.createElement('div');card.className='bld-card';
    const bk=[];
    b.cats.forEach((cg,ci)=>cg.items.forEach((_,ii)=>bk.push(mkKey(b.id,ci,ii))));
    bk.forEach(k=>allKeys.push(k));

    const hd=document.createElement('div');hd.className='bld-hd';
    hd.innerHTML=`<div class="bld-name">${b.name}</div>
      <span class="bdg bdg-r" id="bdg-${b.id}">${bk.length} 項待查</span>
      <span class="tog op" id="tog-${b.id}">▼</span>`;
    const body=document.createElement('div');body.id='body-'+b.id;
    const pb=document.createElement('div');pb.className='pbr';
    pb.innerHTML=`<div class="pbf" id="pb-${b.id}" style="width:0%"></div>`;
    body.appendChild(pb);

    if(b.cats.some(c=>c.cat==='stair')){
      const leg=document.createElement('div');leg.className='legend';
      leg.innerHTML=`<div class="leg-i"><span style="color:var(--c-orange);font-weight:700;font-size:14px">▶</span>&nbsp;原有缺失，重點確認</div>
        <div class="leg-i"><span style="color:var(--c-text3)">□</span>&nbsp;全面清查格</div>`;
      body.appendChild(leg);
    }

    b.cats.forEach((cg,ci)=>{
      const c=CATS[cg.cat];
      const chd=document.createElement('div');chd.className='cat-hd';
      chd.innerHTML=`<div class="cat-ico" style="background:${c.bg}">${c.ico}</div>
        <span class="cat-name">${c.name}</span>
        <span class="cat-law">${c.law}</span>`;
      body.appendChild(chd);
      const grid=document.createElement('div');grid.className='grid';
      cg.items.forEach((it,ii)=>{
        const k=mkKey(b.id,ci,ii);
        const cell=document.createElement('div');
        cell.id='cell-'+k;
        cell.className='cell'+(chk[k]?' done':'');
        const mark=it.defect?`<span class="dm">▶</span>`:'';
        const sev=it.sev==='h'?`<span class="sev-h">優先</span>`:'';
        cell.innerHTML=`${mark}<input type="checkbox" data-key="${k}" ${chk[k]?'checked':''}><span class="cell-txt">${it.label}${sev}</span>`;
        grid.appendChild(cell);
      });
      body.appendChild(grid);
    });

    card.appendChild(hd);card.appendChild(body);con.appendChild(card);

    hd.addEventListener('click',()=>{
      const open=body.style.display!=='none';
      body.style.display=open?'none':'';
      document.getElementById('tog-'+b.id).className='tog'+(open?'':' op');
    });
  });

  // appendix
  const appCard=document.createElement('div');appCard.className='app-card';
  appCard.innerHTML=`<div class="app-title">附錄：法源依據對照表<div class="app-sub">各類消防設備對應法規條文與白話說明</div></div>`;
  LAWS.forEach(law=>{
    const item=document.createElement('div');item.className='law-item';
    item.innerHTML=`<div class="law-head">
        <div class="law-ico" style="background:${law.bg}">${law.ico}</div>
        <div class="law-name">${law.name}${law.sev?`<span class="tag tag-r">優先</span>`:''}</div>
      </div>
      <div class="law-ref">${law.ref}</div>
      <div class="law-plain"><div class="law-plain-label">白話說明</div>${law.plain}</div>`;
    appCard.appendChild(item);
  });
  con.appendChild(appCard);

  con.addEventListener('change',e=>{
    if(e.target.type==='checkbox'){
      const k=e.target.dataset.key;
      chk[k]=e.target.checked;
      const cell=document.getElementById('cell-'+k);
      if(cell)cell.className='cell'+(e.target.checked?' done':'');
      updStats();
    }
  });
  updStats();
}

render();
</script>
</body>
</html>
